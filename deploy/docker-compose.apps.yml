x-mall-app-env: &mall-app-env
  MALL_NACOS_ADDR: nacos:8848
  MALL_MYSQL_HOST: mysql
  MALL_MYSQL_PORT: 3306
  # Local Docker acceptance defaults. Override in .env for shared or deployed environments.
  MALL_MYSQL_USERNAME: ${MALL_MYSQL_USERNAME:-root}
  MALL_MYSQL_PASSWORD: ${MALL_MYSQL_PASSWORD:-root}
  MALL_REDIS_HOST: redis
  MALL_REDIS_PORT: 6379
  MALL_ROCKETMQ_NAME_SERVER: rocketmq-namesrv:9876
  MALL_SENTINEL_DASHBOARD: ${MALL_SENTINEL_DASHBOARD:-sentinel-dashboard:8858}
  MALL_MILVUS_HOST: milvus
  MALL_MILVUS_PORT: 19530
  MALL_AI_DEEPSEEK_API_KEY: ${MALL_AI_DEEPSEEK_API_KEY:-}
  MALL_AI_DEEPSEEK_BASE_URL: ${MALL_AI_DEEPSEEK_BASE_URL:-https://api.deepseek.com}
  MALL_AI_DEEPSEEK_CHAT_MODEL: ${MALL_AI_DEEPSEEK_CHAT_MODEL:-deepseek-chat}
  MALL_AI_EMBEDDING_API_KEY: ${MALL_AI_EMBEDDING_API_KEY:-}
  MALL_AI_EMBEDDING_BASE_URL: ${MALL_AI_EMBEDDING_BASE_URL:-https://api.openai.com}
  MALL_AI_EMBEDDING_MODEL: ${MALL_AI_EMBEDDING_MODEL:-text-embedding-3-small}
  MALL_CORS_ALLOWED_ORIGIN_PATTERNS: http://localhost:5173,http://localhost:4173
  MALL_JWT_SECRET: ${MALL_JWT_SECRET:-replace-with-at-least-32-byte-secret-for-local}

x-mall-build: &mall-build
  context: ..
  dockerfile: Dockerfile

services:
  mall-auth:
    image: mall-auth:local
    build:
      <<: *mall-build
      args:
        SERVICE: mall-auth
    environment:
      <<: *mall-app-env
    depends_on:
      - mysql
      - nacos
    ports:
      - "8081:8081"

  mall-user:
    image: mall-user:local
    build:
      <<: *mall-build
      args:
        SERVICE: mall-user
    environment:
      <<: *mall-app-env
    depends_on:
      - mysql
      - nacos
    ports:
      - "8082:8082"

  mall-product:
    image: mall-product:local
    build:
      <<: *mall-build
      args:
        SERVICE: mall-product
    environment:
      <<: *mall-app-env
    depends_on:
      - mysql
      - redis
      - nacos
    ports:
      - "8083:8083"

  mall-promotion:
    image: mall-promotion:local
    build:
      <<: *mall-build
      args:
        SERVICE: mall-promotion
    environment:
      <<: *mall-app-env
    depends_on:
      - mysql
      - redis
      - nacos
    ports:
      - "8089:8089"

  mall-inventory:
    image: mall-inventory:local
    build:
      <<: *mall-build
      args:
        SERVICE: mall-inventory
    environment:
      <<: *mall-app-env
    depends_on:
      - mysql
      - nacos
    ports:
      - "8085:8085"

  mall-order:
    image: mall-order:local
    build:
      <<: *mall-build
      args:
        SERVICE: mall-order
    depends_on:
      mysql:
        condition: service_started
      redis:
        condition: service_started
      nacos:
        condition: service_started
      rocketmq-namesrv:
        condition: service_started
      rocketmq-broker:
        condition: service_started
      rocketmq-init:
        condition: service_completed_successfully
      mall-product:
        condition: service_started
      mall-promotion:
        condition: service_started
      mall-inventory:
        condition: service_started
    environment:
      <<: *mall-app-env
    ports:
      - "8084:8084"

  mall-payment:
    image: mall-payment:local
    build:
      <<: *mall-build
      args:
        SERVICE: mall-payment
    depends_on:
      mysql:
        condition: service_started
      nacos:
        condition: service_started
      rocketmq-namesrv:
        condition: service_started
      rocketmq-broker:
        condition: service_started
      rocketmq-init:
        condition: service_completed_successfully
      mall-order:
        condition: service_started
    environment:
      <<: *mall-app-env
    ports:
      - "8087:8087"

  mall-cart:
    image: mall-cart:local
    build:
      <<: *mall-build
      args:
        SERVICE: mall-cart
    depends_on:
      - mysql
      - nacos
      - mall-product
      - mall-order
    environment:
      <<: *mall-app-env
    ports:
      - "8086:8086"

  mall-ai:
    image: mall-ai:local
    build:
      <<: *mall-build
      args:
        SERVICE: mall-ai
    depends_on:
      - mysql
      - nacos
      - milvus
      - mall-order
    environment:
      <<: *mall-app-env
    ports:
      - "8090:8090"

  mall-gateway:
    image: mall-gateway:local
    build:
      <<: *mall-build
      args:
        SERVICE: mall-gateway
    depends_on:
      - nacos
      - mall-auth
      - mall-user
      - mall-product
      - mall-promotion
      - mall-cart
      - mall-order
      - mall-inventory
      - mall-payment
      - mall-ai
    environment:
      <<: *mall-app-env
    ports:
      - "8080:8080"
