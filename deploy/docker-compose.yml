services:
  mysql:
    image: mysql:8.4
    container_name: mall-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MALL_MYSQL_ROOT_PASSWORD:-root}
      MYSQL_ROOT_HOST: "%"
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mall-mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4
    container_name: mall-redis
    ports:
      - "6379:6379"
    volumes:
      - mall-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  nacos:
    image: nacos/nacos-server:v3.0.3
    container_name: mall-nacos
    environment:
      JVM_XMS: 256m
      JVM_XMX: 512m
      JVM_XMN: 128m
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      NACOS_AUTH_TOKEN: "bWFsbC1uYWNvcy1kZW1vLXNlY3JldC1rZXktMzItYnl0ZXM="
      NACOS_AUTH_IDENTITY_KEY: "mall"
      NACOS_AUTH_IDENTITY_VALUE: "mall-nacos"
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
      # Nacos 3.x console listens on container port 8080. Keep VM host 8080 free for mall-gateway.
      - "8849:8080"

  rocketmq-namesrv:
    image: apache/rocketmq:5.3.1
    container_name: mall-rocketmq-namesrv
    ports:
      - "9876:9876"
    command: ["sh", "mqnamesrv"]

  rocketmq-broker:
    image: apache/rocketmq:5.3.1
    container_name: mall-rocketmq-broker
    depends_on:
      - rocketmq-namesrv
    ports:
      - "10909:10909"
      - "10911:10911"
    environment:
      NAMESRV_ADDR: rocketmq-namesrv:9876
      JAVA_OPT_EXT: "-Xms256m -Xmx512m -Xmn128m -XX:MaxDirectMemorySize=256m"
      # MALL_VM_HOST is the VM IP reachable from Windows/IDEA. Override broker IP only
      # when Docker or VM networking exposes a different address to Java clients.
      MALL_VM_HOST: ${MALL_VM_HOST:-127.0.0.1}
      MALL_ROCKETMQ_BROKER_IP: ${MALL_ROCKETMQ_BROKER_IP:-}
    command:
      - sh
      - -c
      - |
        BROKER_IP="$${MALL_ROCKETMQ_BROKER_IP:-$${MALL_VM_HOST:-127.0.0.1}}"
        cat > /tmp/broker.conf <<EOF
        brokerClusterName=DefaultCluster
        brokerName=broker-a
        brokerId=0
        brokerRole=ASYNC_MASTER
        flushDiskType=ASYNC_FLUSH
        listenPort=10911
        brokerIP1=$${BROKER_IP}
        autoCreateTopicEnable=true
        EOF
        sh mqbroker -n rocketmq-namesrv:9876 -c /tmp/broker.conf

  rocketmq-init:
    image: apache/rocketmq:5.3.1
    container_name: mall-rocketmq-init
    depends_on:
      - rocketmq-namesrv
      - rocketmq-broker
    restart: "no"
    command:
      - sh
      - -c
      - |
        set -e
        TOPICS="order-paid-topic seckill-order-topic inventory-deducted-topic"
        for i in $$(seq 1 30); do
          if sh mqadmin clusterList -n rocketmq-namesrv:9876 >/dev/null 2>&1; then
            break
          fi
          echo "waiting for RocketMQ broker registration ($$i/30)"
          sleep 2
        done
        for topic in $$TOPICS; do
          sh mqadmin updateTopic -n rocketmq-namesrv:9876 -c DefaultCluster -t $$topic -r 4 -w 4
        done
        echo "RocketMQ topics initialized: $$TOPICS"

  rocketmq-dashboard:
    image: apacherocketmq/rocketmq-dashboard:latest
    container_name: mall-rocketmq-dashboard
    depends_on:
      - rocketmq-namesrv
    environment:
      JAVA_OPTS: "-Drocketmq.namesrv.addr=rocketmq-namesrv:9876"
    ports:
      # The current dashboard image starts embedded Tomcat on 8082.
      - "8088:8082"

  sentinel-dashboard:
    image: mall-sentinel-dashboard:${SENTINEL_VERSION:-1.8.9}
    build:
      context: ./sentinel-dashboard
      args:
        SENTINEL_VERSION: ${SENTINEL_VERSION:-1.8.9}
        SENTINEL_DASHBOARD_JAR_URL: ${SENTINEL_DASHBOARD_JAR_URL:-https://gh.llkk.cc/https://github.com/alibaba/Sentinel/releases/download/1.8.9/sentinel-dashboard-1.8.9.jar}
    container_name: mall-sentinel-dashboard
    ports:
      - "8858:8858"

  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: mall-milvus-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - mall-milvus-etcd-data:/etcd
    command: etcd -advertise-client-urls=http://0.0.0.0:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: mall-milvus-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - mall-milvus-minio-data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    image: milvusdb/milvus:v2.3.21
    container_name: mall-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_ACCESS_KEY: minioadmin
    depends_on:
      milvus-etcd:
        condition: service_healthy
      milvus-minio:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - mall-milvus-data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: mall-prometheus
    profiles:
      - observability
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - mall-prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle

  grafana:
    image: grafana/grafana:11.1.4
    container_name: mall-grafana
    profiles:
      - observability
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    volumes:
      - mall-grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin

volumes:
  mall-mysql-data:
  mall-redis-data:
  mall-prometheus-data:
  mall-grafana-data:
  mall-milvus-data:
  mall-milvus-etcd-data:
  mall-milvus-minio-data:
