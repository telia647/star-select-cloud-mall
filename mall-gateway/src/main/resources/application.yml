server:
  port: 8080

spring:
  application:
    name: mall-gateway
  # Middleware addresses are environment-specific. The localhost fallback is for local development only.
  cloud:
    nacos:
      discovery:
        server-addr: ${MALL_NACOS_ADDR:${MALL_VM_HOST:localhost}:8848}
    sentinel:
      transport:
        dashboard: ${MALL_SENTINEL_DASHBOARD:${MALL_VM_HOST:localhost}:8858}
    gateway:
      server:
        webflux:
          routes:
            - id: mall-auth
              uri: lb://mall-auth
              predicates:
                - Path=/api/auth/**
              filters:
                - StripPrefix=1
            - id: mall-user
              uri: lb://mall-user
              predicates:
                - Path=/api/users/**
              filters:
                - StripPrefix=1
            - id: mall-product-products
              uri: lb://mall-product
              predicates:
                - Path=/api/products/**
              filters:
                - StripPrefix=1
            - id: mall-product-categories
              uri: lb://mall-product
              predicates:
                - Path=/api/categories/**
              filters:
                - StripPrefix=1
            - id: mall-promotion
              uri: lb://mall-promotion
              predicates:
                - Path=/api/promotions/**
              filters:
                - StripPrefix=1
            - id: mall-cart
              uri: lb://mall-cart
              predicates:
                - Path=/api/cart/**
              filters:
                - StripPrefix=1
            - id: mall-order
              uri: lb://mall-order
              predicates:
                - Path=/api/orders/**
              filters:
                - StripPrefix=1
            - id: mall-inventory
              uri: lb://mall-inventory
              predicates:
                - Path=/api/inventory/**
              filters:
                - StripPrefix=1
            - id: mall-payment
              uri: lb://mall-payment
              predicates:
                - Path=/api/payments/**
              filters:
                - StripPrefix=1

mall:
  jwt:
    secret: ${MALL_JWT_SECRET:mall-demo-jwt-secret-key-for-local-development}
  cors:
    allowed-origin-patterns: ${MALL_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173}
  gateway:
    flow:
      auth-login:
        qps: ${MALL_FLOW_AUTH_LOGIN_QPS:80}
        burst: ${MALL_FLOW_AUTH_LOGIN_BURST:20}
      product-read:
        qps: ${MALL_FLOW_PRODUCT_READ_QPS:600}
        burst: ${MALL_FLOW_PRODUCT_READ_BURST:100}
      seckill-catalog:
        qps: ${MALL_FLOW_SECKILL_CATALOG_QPS:500}
        burst: ${MALL_FLOW_SECKILL_CATALOG_BURST:100}
      seckill-token:
        qps: ${MALL_FLOW_SECKILL_TOKEN_QPS:200}
        burst: ${MALL_FLOW_SECKILL_TOKEN_BURST:50}
      seckill-submit:
        qps: ${MALL_FLOW_SECKILL_SUBMIT_QPS:120}
        burst: ${MALL_FLOW_SECKILL_SUBMIT_BURST:30}
      order-route:
        qps: ${MALL_FLOW_ORDER_ROUTE_QPS:700}
        burst: ${MALL_FLOW_ORDER_ROUTE_BURST:100}
      promotion-route:
        qps: ${MALL_FLOW_PROMOTION_ROUTE_QPS:700}
        burst: ${MALL_FLOW_PROMOTION_ROUTE_BURST:100}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{traceId}] %logger{36} - %msg%n"
