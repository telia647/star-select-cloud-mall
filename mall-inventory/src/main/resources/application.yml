server:
  port: 8085

spring:
  application:
    name: mall-inventory
  # Middleware addresses and credentials are environment-specific. Defaults are local development fallbacks only.
  cloud:
    nacos:
      discovery:
        server-addr: ${MALL_NACOS_ADDR:${MALL_VM_HOST:localhost}:8848}
  # Override MALL_MYSQL_* outside local acceptance; do not use root/root in shared or production environments.
  datasource:
    url: jdbc:mysql://${MALL_MYSQL_HOST:${MALL_VM_HOST:localhost}}:${MALL_MYSQL_PORT:3306}/mall_inventory?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${MALL_MYSQL_USERNAME:root}
    password: ${MALL_MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id

mall:
  jwt:
    secret: ${MALL_JWT_SECRET:mall-demo-jwt-secret-key-for-local-development}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{traceId}] %logger{36} - %msg%n"
